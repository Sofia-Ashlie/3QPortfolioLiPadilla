<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name = "viewport" content="width+device-width, inital-scale=1.0">
      <meta name ="description" content="4Q Portfolio Movie Rating">
      <meta name = "keywords" content = "4Q, Movie, Rating">
      <meta name = "author" content="Sofia Ashlie Q. Padilla">


      <title>4Q Movie Rating</title>


      <link rel = "stylesheet" href = "movie.css">
      <link rel = "icon" href="../assets/cute.sticker.jpg" type = "image/x-icon">
    
      <script src="movie 2G.js" defer></script>
  </head>

    <body>
        <fieldset class="container">
        <form id="Add" method="post" action="submit" onsubmit="addMovie()">
        
        <label for="Title">Title:</label><br>
        <input type="text" id="Title" name="Title" required><br>
    
        <label for="Year">Year:</label><br>
        <input type="text" id="Year" name="Year" required><br>
    
        <label for="Genre">Genre:</label><br>
        <select id="Genre">
            <option value="Action" selected>Action</option>
            <option value="Crime">Crime</option>
            <option value="Sci-fi">Sci-fi</option>
            <option value="Romance">Romance</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Comedy">Comedy</option>
            <option value="Horror">Horror</option>
        </select><br>

        Rating: <br>
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
            
            <span class="fa fa-star star" value="1"></span>
            <span class="fa fa-star star" value="2"></span>
            <span class="fa fa-star star" value="3"></span>
            <span class="fa fa-star star" value="4"></span>
            <span class="fa fa-star star" value="5"></span>
        <br>

        <button onclick="addMovie()">Add Movie</button>

        <h3>Movie List</h3>
        <div id="movieList"></div>

          </fieldset>
          </form>
      </body>

</html>


<script>
  //Star Rating
  let selectedRating = 0;

      document.querySelectorAll(".star").forEach(star => {
        star.addEventListener("click", function() {
          selectedRating = this.getAttribute("value");
          updateStars(selectedRating);
        });
      });

      function updateStars(rating) {
        document.querySelectorAll(".star").forEach(star => {
          star.classList.remove("selected");
          if (star.getAttribute("value") <= rating) {
            star.classList.add("selected");
            }
        });
      }

      window.onload = displayMovies;
</script>
